<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNest - Free Online Tools for PDF, Images, Text & More</title>
    <meta name="description" content="40+ free online tools for PDF, images, text, spreadsheets, and calculations. 100% privacy-first — all processing happens in your browser. No uploads, no tracking." />
    <meta name="keywords" content="free online tools, PDF tools, image converter, text tools, CSV converter, calculator, privacy, no upload" />
    <meta name="author" content="ToolNest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph -->
    <meta property="og:title" content="ToolNest - Free Online Tools" />
    <meta property="og:description" content="40+ free online tools. All processing in your browser." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://toolnest.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ToolNest - Free Online Tools" />
    <meta name="twitter:description" content="40+ free online tools. All processing in your browser." />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ToolNest",
      "description": "Free online tools platform with 40+ tools for PDF, images, text, spreadsheets and more.",
      "url": "https://toolnest.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://toolnest.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
